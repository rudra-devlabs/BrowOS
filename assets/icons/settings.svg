<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="set-bg" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="0.5" stop-color="#1b1b1f"/>
      <stop offset="1" stop-color="#101013"/>
    </linearGradient>
    <linearGradient id="gear-main" x1="32" y1="12" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f7fa"/>
      <stop offset="1" stop-color="#a7a7b0"/>
    </linearGradient>
    <linearGradient id="gear-inner" x1="32" y1="23" x2="32" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b8b95"/>
      <stop offset="1" stop-color="#6a6a72"/>
    </linearGradient>
    <filter id="set-shadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#set-bg)"/>
  <rect x="6" y="6" width="52" height="52" rx="14" stroke="#3a3a40"/>

  <!-- Gear -->
  <g filter="url(#set-shadow)">
    <g transform="translate(32 32)">
      <rect x="-3.2" y="-20" width="6.4" height="10" rx="2.5" fill="url(#gear-main)"/>
      <rect x="-3.2" y="10" width="6.4" height="10" rx="2.5" fill="url(#gear-main)"/>
      <rect x="-20" y="-3.2" width="10" height="6.4" rx="2.5" fill="url(#gear-main)"/>
      <rect x="10" y="-3.2" width="10" height="6.4" rx="2.5" fill="url(#gear-main)"/>

      <rect x="-3.2" y="-20" width="6.4" height="10" rx="2.5" fill="url(#gear-main)" transform="rotate(45)"/>
      <rect x="-3.2" y="10" width="6.4" height="10" rx="2.5" fill="url(#gear-main)" transform="rotate(45)"/>
      <rect x="-20" y="-3.2" width="10" height="6.4" rx="2.5" fill="url(#gear-main)" transform="rotate(45)"/>
      <rect x="10" y="-3.2" width="10" height="6.4" rx="2.5" fill="url(#gear-main)" transform="rotate(45)"/>

      <circle cx="0" cy="0" r="14" fill="url(#gear-main)"/>
      <circle cx="0" cy="0" r="8" fill="url(#gear-inner)"/>
      <circle cx="0" cy="0" r="2.3" fill="#f5f5f8"/>
      <circle cx="0" cy="0" r="14" stroke="#8d8d96" stroke-opacity="0.45"/>
    </g>
  </g>
</svg>
