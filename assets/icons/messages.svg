<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="msg-bg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58e27a"/>
      <stop offset="0.55" stop-color="#39cf61"/>
      <stop offset="1" stop-color="#23b84d"/>
    </linearGradient>
    <linearGradient id="bubble" x1="15" y1="16" x2="49" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2fff6"/>
    </linearGradient>
    <filter id="msg-shadow" x="-20%" y="-20%" width="150%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- Square tile -->
  <rect x="6" y="6" width="52" height="52" rx="13" fill="url(#msg-bg)"/>

  <!-- Main chat bubble -->
  <g filter="url(#msg-shadow)">
    <path d="M18 18h28a6 6 0 0 1 6 6v13a6 6 0 0 1-6 6H32.5l-8 6.5c-1.2 0.9-2.8-0.1-2.6-1.6l0.8-4.9H18a6 6 0 0 1-6-6V24a6 6 0 0 1 6-6Z" fill="url(#bubble)"/>
  </g>

  <!-- Dots -->
  <circle cx="24" cy="31" r="2.7" fill="#34c759"/>
  <circle cx="32" cy="31" r="2.7" fill="#34c759"/>
  <circle cx="40" cy="31" r="2.7" fill="#34c759"/>

  <!-- Soft top gloss -->
  <path d="M13 14c8-5 29-6 38-1" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2" stroke-linecap="round"/>
</svg>
